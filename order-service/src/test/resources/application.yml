spring:
  datasource:
    url: jdbc:h2:mem:order_service_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  cloud:
    discovery:
      enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
